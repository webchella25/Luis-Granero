# .github/workflows/cleanup-tokens.yml
name: 🧹 Cleanup Expired Tokens

on:
  schedule:
    # Ejecutar todos los lunes a las 3:00 AM UTC
    - cron: '0 3 * * 1'
  
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🧹 Trigger Token Cleanup
        run: |
          curl -X POST https://www.luisgranero.com/api/cron/cleanup-tokens \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
      
      - name: ✅ Log Success
        if: success()
        run: echo "Tokens cleaned successfully at $(date)"